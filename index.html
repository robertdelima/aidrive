<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Document Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-800">

    <div class="max-w-3xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-8 text-white text-center">
            <h1 class="text-3xl font-bold mb-2">Analisador de Documentos IA</h1>
            <p class="opacity-80">Faça upload de um arquivo e faça perguntas ao Gemini</p>
        </div>

        <div class="p-8 space-y-6">
            <div id="drop-zone" class="border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center hover:border-blue-500 transition-colors cursor-pointer bg-slate-50">
                <input type="file" id="file-input" class="hidden" accept=".txt,.pdf">
                <div id="upload-placeholder">
                    <svg class="w-12 h-12 mx-auto text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-slate-600 font-medium">Clique para subir ou arraste um PDF ou TXT</p>
                </div>
                <div id="file-info" class="hidden">
                    <p class="text-blue-600 font-bold text-lg" id="file-name"></p>
                    <button onclick="resetarUpload()" class="text-xs text-red-500 underline mt-2">Trocar arquivo</button>
                </div>
            </div>

            <div class="space-y-4">
                <textarea id="pergunta-input" rows="3" placeholder="Ex: Faça um resumo dos pontos principais deste contrato..." 
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"></textarea>
                
                <button onclick="enviarParaIA()" id="btn-processar" disabled
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    Analisar com Gemini IA
                </button>
            </div>

            <div id="resultado-container" class="hidden space-y-2">
                <h3 class="text-sm font-bold text-slate-500 uppercase">Resposta da IA</h3>
                <div id="resposta-ia" class="bg-slate-100 p-6 rounded-2xl text-slate-700 leading-relaxed border border-slate-200"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        let textoExtraido = "";
        let nomeArquivo = "";

        // Clique na zona de drop
        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => processarArquivo(e.target.files[0]);

        async function processarArquivo(file) {
            if (!file) return;
            nomeArquivo = file.name;
            
            if (file.type === "application/pdf") {
                textoExtraido = await lerPDF(file);
            } else {
                textoExtraido = await file.text();
            }

            document.getElementById('upload-placeholder').classList.add('hidden');
            document.getElementById('file-info').classList.remove('hidden');
            document.getElementById('file-name').innerText = `📄 ${nomeArquivo}`;
            document.getElementById('btn-processar').disabled = false;
        }

        async function lerPDF(file) {
            const reader = new FileReader();
            return new Promise((resolve) => {
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let textoFull = "";
                    for(let i=1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        textoFull += content.items.map(s => s.str).join(' ') + "\n";
                    }
                    resolve(textoFull);
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function resetarUpload() {
            location.reload();
        }

        async function enviarParaIA() {
            const pergunta = document.getElementById('pergunta-input').value;
            const resContainer = document.getElementById('resultado-container');
            const resText = document.getElementById('resposta-ia');
            
            if (!pergunta) return alert("Digite uma pergunta!");

            resContainer.classList.remove('hidden');
            resText.innerHTML = '<div class="flex items-center gap-2 text-blue-600 animate-pulse font-medium">Pensando...</div>';

            try {
                const response = await fetch('http://localhost:3000/analisar-documento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ textoDocumento: textoExtraido, pergunta, nomeArquivo })
                });
                
                const data = await response.json();
                resText.innerText = data.resposta;
            } catch (err) {
                resText.innerText = "Erro ao conectar com o servidor.";
            }
        }
    </script>
</body>
</html>
